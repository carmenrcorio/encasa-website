name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH_NAME"
          
          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -z "$EXISTING_PR" ]; then
            # Create new PR
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "Auto-merge: $BRANCH_NAME" \
              --body "Automated PR from Claude branch. Auto-merging to main for production deployment." \
              --label "auto-merge")
            echo "Created PR: $PR_URL"
          else
            echo "PR #$EXISTING_PR already exists"
          fi
          
          # Get PR number
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --base main --json number --jq '.[0].number')
          echo "PR Number: $PR_NUMBER"
          
          # Merge the PR
          gh pr merge "$PR_NUMBER" --merge --auto || gh pr merge "$PR_NUMBER" --merge
          
          echo "Successfully merged PR #$PR_NUMBER"
